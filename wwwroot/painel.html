<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia — Painel do Barbeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0D0D0D;
    --dark-2: #161616;
    --dark-3: #1F1F1F;
    --dark-4: #2A2A2A;
    --text: #F0EDE8;
    --text-muted: #888;
    --green: #27AE60;
    --red: #C0392B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(ellipse at 80% 10%, rgba(201,168,76,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* LOGIN */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  .login-box {
    background: var(--dark-2);
    border: 1px solid var(--dark-4);
    border-radius: 2px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    animation: fadeIn 0.4s ease;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.05em;
  }

  .login-logo h1 span { color: var(--gold); }
  .login-logo p { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }

  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    background: var(--dark-3);
    border: 1px solid var(--dark-4);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: all 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--gold); background: rgba(201,168,76,0.04); }
  input::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary { background: var(--gold); color: var(--dark); }
  .btn-primary:hover { background: var(--gold-light); }

  .btn-outline {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--dark-4);
    margin-top: 10px;
  }

  .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-danger {
    background: rgba(192,57,43,0.15);
    color: #E74C3C;
    border: 1px solid rgba(192,57,43,0.3);
    padding: 8px 14px;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    width: auto;
  }

  .btn-danger:hover { background: rgba(192,57,43,0.25); }

  .msg-error {
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.3);
    color: #E74C3C;
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 0.82rem;
    margin-bottom: 14px;
    display: none;
  }

  /* DASHBOARD */
  .dashboard { display: none; position: relative; z-index: 1; }

  .topbar {
    background: var(--dark-2);
    border-bottom: 1px solid var(--dark-4);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .topbar-logo span { color: var(--gold); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .barbeiro-name {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .barbeiro-name strong { color: var(--text); }

  .btn-logout {
    background: none;
    border: 1px solid var(--dark-4);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-logout:hover { border-color: var(--red); color: #E74C3C; }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* SIDEBAR */
  .sidebar {}

  .card {
    background: var(--dark-2);
    border: 1px solid var(--dark-4);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* Mini calendar */
  .mini-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .mini-month {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--gold);
    text-transform: capitalize;
  }

  .mini-nav {
    background: none;
    border: 1px solid var(--dark-4);
    color: var(--text-muted);
    width: 28px;
    height: 28px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mini-nav:hover { border-color: var(--gold); color: var(--gold); }

  .mini-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .mini-day-name {
    text-align: center;
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 0;
  }

  .mini-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    border-radius: 2px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .mini-day.work {
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.3);
    color: var(--gold);
  }

  .mini-day.work:hover { background: rgba(201,168,76,0.2); }

  .mini-day.selected {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 700;
  }

  .mini-day:not(.empty):hover {
    border-color: var(--dark-4);
    color: var(--text);
  }

  .mini-day.empty { cursor: default; }

  .mini-day.today { border-color: rgba(201,168,76,0.5) !important; }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--dark-3);
    border: 1px solid var(--dark-4);
    border-radius: 2px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Agenda principal */
  .agenda-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .agenda-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
  }

  .agenda-date {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 2px;
  }

  /* Horários da agenda */
  .horario-row {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 12px;
    margin-bottom: 6px;
    align-items: stretch;
    min-height: 52px;
  }

  .horario-time {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    border-right: 1px solid var(--dark-4);
    padding-right: 12px;
  }

  .horario-slot {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 0.85rem;
    border: 1px solid var(--dark-4);
    background: var(--dark-3);
    color: var(--text-muted);
  }

  .horario-slot.agendado {
    background: rgba(201,168,76,0.06);
    border-color: rgba(201,168,76,0.25);
    color: var(--text);
    justify-content: space-between;
  }

  .agendado-info { flex: 1; }
  .agendado-nome { font-weight: 500; font-size: 0.9rem; }
  .agendado-tel { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

  .btn-cancelar {
    background: none;
    border: 1px solid rgba(192,57,43,0.3);
    color: #E74C3C;
    padding: 5px 10px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .btn-cancelar:hover { background: rgba(192,57,43,0.15); }

  .horario-divider {
    grid-column: 1 / -1;
    height: 1px;
    background: var(--dark-4);
    margin: 10px 0;
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--dark-4);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--dark-4);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .empty-msg span { display: block; font-size: 2rem; margin-bottom: 8px; }

  .dia-nao-trabalho {
    text-align: center;
    padding: 40px 20px;
    border: 1px dashed var(--dark-4);
    border-radius: 2px;
  }

  .dia-nao-trabalho span { display: block; font-size: 2rem; margin-bottom: 8px; color: var(--text-muted); }
  .dia-nao-trabalho p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }

  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 2px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .tag-work { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .tag-off { background: var(--dark-3); color: var(--text-muted); border: 1px solid var(--dark-4); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>BARBER<span>SHOP</span></h1>
      <p>Painel do Barbeiro</p>
    </div>
    <div class="msg-error" id="loginErro"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <button class="btn btn-primary" onclick="fazerLogin()">Entrar no painel</button>
    <button class="btn btn-outline" onclick="window.location.href='index.html'">← Voltar ao site</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">BARBER<span>SHOP</span></div>
    <div class="topbar-right">
      <span class="barbeiro-name">Olá, <strong id="barbeiroNome">—</strong></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">

      <!-- Stats -->
      <div class="card">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-num" id="statHoje">—</div>
            <div class="stat-label">Hoje</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="statMes">—</div>
            <div class="stat-label">Este mês</div>
          </div>
        </div>
      </div>

      <!-- Calendário de gestão -->
      <div class="card">
        <p class="card-title">Calendário</p>
        <p class="card-desc">Clique nos dias para ativar ou desativar sua agenda.</p>

        <div class="mini-cal-header">
          <button class="mini-nav" onclick="mudarMesGestao(-1)">&#8592;</button>
          <span class="mini-month" id="miniMonth"></span>
          <button class="mini-nav" onclick="mudarMesGestao(1)">&#8594;</button>
        </div>

        <div class="mini-grid" id="miniGrid">
          <div class="mini-day-name">D</div>
          <div class="mini-day-name">S</div>
          <div class="mini-day-name">T</div>
          <div class="mini-day-name">Q</div>
          <div class="mini-day-name">Q</div>
          <div class="mini-day-name">S</div>
          <div class="mini-day-name">S</div>
        </div>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:rgba(201,168,76,0.3);border:1px solid var(--gold)"></div>
            Disponível
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--dark-3);border:1px solid var(--dark-4)"></div>
            Folga
          </div>
        </div>
      </div>
    </div>

    <!-- Agenda do dia -->
    <div>
      <div class="card">
        <div class="agenda-header">
          <div>
            <div class="agenda-title" id="agendaTitulo">
              Agenda
              <span class="tag tag-off" id="tagDia">—</span>
            </div>
            <div class="agenda-date" id="agendaData">Selecione um dia</div>
          </div>
        </div>

        <div id="agendaContent">
          <div class="empty-msg">
            <span>📅</span>
            Selecione um dia no calendário para ver os agendamentos.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'https://lovely-heart-production.up.railway.app/api';
  let token = localStorage.getItem('barber_token');
  let barbeiroNomeLocal = localStorage.getItem('barber_nome');

  let gestaoAno, gestaoMes;
  let diasTrabalho = [];
  let dataSelecionada = null;

  const hoje = new Date();

  // =================== AUTH ===================

  async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    const erro = document.getElementById('loginErro');

    if (!email || !senha) {
      erro.textContent = 'Preencha e-mail e senha.';
      erro.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });

      if (!res.ok) {
        erro.textContent = 'E-mail ou senha inválidos.';
        erro.style.display = 'block';
        return;
      }

      const data = await res.json();
      localStorage.setItem('barber_token', data.token);
      localStorage.setItem('barber_nome', data.nome);
      token = data.token;
      barbeiroNomeLocal = data.nome;
      iniciarDashboard();

    } catch {
      erro.textContent = 'Erro de conexão.';
      erro.style.display = 'block';
    }
  }

  function logout() {
    localStorage.removeItem('barber_token');
    localStorage.removeItem('barber_nome');
    token = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginWrap').style.display = 'flex';
  }

  function iniciarDashboard() {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('barbeiroNome').textContent = barbeiroNomeLocal || 'Barbeiro';

    gestaoAno = hoje.getFullYear();
    gestaoMes = hoje.getMonth();

    carregarStats();
    renderMiniCal();
  }

  // =================== STATS ===================

  async function carregarStats() {
    try {
      const dataHoje = formatDate(hoje);
      const [resHoje, resMes] = await Promise.all([
        fetch(`${API}/agendamento/data/${dataHoje}`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${API}/agendamento/mes/${hoje.getFullYear()}/${hoje.getMonth() + 1}`, { headers: { Authorization: `Bearer ${token}` } })
      ]);
      const agHoje = await resHoje.json();
      const agMes = await resMes.json();
      document.getElementById('statHoje').textContent = Array.isArray(agHoje) ? agHoje.length : 0;
      document.getElementById('statMes').textContent = Array.isArray(agMes) ? agMes.length : 0;
    } catch {}
  }

  // =================== MINI CALENDÁRIO ===================

  async function renderMiniCal() {
    const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    document.getElementById('miniMonth').textContent = `${meses[gestaoMes]} ${gestaoAno}`;

    try {
      const res = await fetch(`${API}/barbeiro/dias-disponiveis/${gestaoAno}/${gestaoMes + 1}`);
      diasTrabalho = await res.json();
    } catch { diasTrabalho = []; }

    const grid = document.getElementById('miniGrid');
    // Mantém os headers
    grid.innerHTML = `
      <div class="mini-day-name">D</div>
      <div class="mini-day-name">S</div>
      <div class="mini-day-name">T</div>
      <div class="mini-day-name">Q</div>
      <div class="mini-day-name">Q</div>
      <div class="mini-day-name">S</div>
      <div class="mini-day-name">S</div>
    `;

    const primeiroDia = new Date(gestaoAno, gestaoMes, 1).getDay();
    const totalDias = new Date(gestaoAno, gestaoMes + 1, 0).getDate();

    for (let i = 0; i < primeiroDia; i++) {
      grid.innerHTML += `<div class="mini-day empty"></div>`;
    }

    for (let d = 1; d <= totalDias; d++) {
      const dataStr = formatDateManual(gestaoAno, gestaoMes + 1, d);
      const isWork = diasTrabalho.includes(dataStr);
      const isHoje = d === hoje.getDate() && gestaoMes === hoje.getMonth() && gestaoAno === hoje.getFullYear();
      const isSelected = dataSelecionada === dataStr;

      let cls = 'mini-day';
      if (isWork) cls += ' work';
      if (isHoje) cls += ' today';
      if (isSelected) cls += ' selected';

      grid.innerHTML += `<div class="${cls}" onclick="clicarDia('${dataStr}')">${d}</div>`;
    }
  }

  function mudarMesGestao(dir) {
    gestaoMes += dir;
    if (gestaoMes > 11) { gestaoMes = 0; gestaoAno++; }
    if (gestaoMes < 0) { gestaoMes = 11; gestaoAno--; }
    renderMiniCal();
  }

  async function clicarDia(dataStr) {
    dataSelecionada = dataStr;
    renderMiniCal();
    carregarAgendaDia(dataStr);
  }

  async function toggleDia(dataStr) {
    try {
      await fetch(`${API}/barbeiro/dias-trabalho`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify(dataStr)
      });
      renderMiniCal();
      carregarAgendaDia(dataSelecionada);
    } catch {
      alert('Erro ao alterar dia.');
    }
  }

  // =================== AGENDA DO DIA ===================

  async function carregarAgendaDia(dataStr) {
    const [ano, mes, dia] = dataStr.split('-');
    const meses = ['janeiro','fevereiro','março','abril','maio','junho',
                   'julho','agosto','setembro','outubro','novembro','dezembro'];
    const nomeMes = meses[parseInt(mes) - 1];

    document.getElementById('agendaData').textContent = `${dia} de ${nomeMes} de ${ano}`;

    const isDiaTrabalho = diasTrabalho.includes(dataStr);
    const tag = document.getElementById('tagDia');
    tag.textContent = isDiaTrabalho ? 'Disponível' : 'Folga';
    tag.className = `tag ${isDiaTrabalho ? 'tag-work' : 'tag-off'}`;

    const content = document.getElementById('agendaContent');

    if (!isDiaTrabalho) {
      content.innerHTML = `
        <div class="dia-nao-trabalho">
          <span>🏖️</span>
          <p>Este dia está marcado como folga.</p>
          <button class="btn btn-primary" style="width:auto;padding:10px 24px" onclick="toggleDia('${dataStr}')">
            Ativar este dia
          </button>
        </div>`;
      return;
    }

    content.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

    try {
      const res = await fetch(`${API}/agendamento/data/${dataStr}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const agendamentos = await res.json();
      renderAgenda(dataStr, agendamentos);
    } catch {
      content.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Erro ao carregar agenda.</p>';
    }
  }

  const HORARIOS_MANHA = ['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30'];
  const HORARIOS_TARDE = ['14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30'];

  function renderAgenda(dataStr, agendamentos) {
    const mapAg = {};
    agendamentos.forEach(a => {
      mapAg[a.horario.substring(0,5)] = a;
    });

    let html = '';

    html += `<div class="section-label">Manhã</div>`;
    HORARIOS_MANHA.forEach(h => {
      html += renderSlot(h, mapAg[h], dataStr);
    });

    html += `<div class="horario-divider"></div>`;
    html += `<div class="section-label">Tarde</div>`;
    HORARIOS_TARDE.forEach(h => {
      html += renderSlot(h, mapAg[h], dataStr);
    });

    html += `
      <div style="margin-top:20px;text-align:right">
        <button class="btn btn-danger" onclick="toggleDia('${dataStr}')">
          Marcar dia como folga
        </button>
      </div>`;

    document.getElementById('agendaContent').innerHTML = html;
  }

  function renderSlot(horario, ag, dataStr) {
    if (ag) {
      return `
        <div class="horario-row">
          <div class="horario-time">${horario}</div>
          <div class="horario-slot agendado">
            <div class="agendado-info">
              <div class="agendado-nome">✂ ${ag.nomeCliente}</div>
              <div class="agendado-tel">📱 ${ag.telefone}</div>
            </div>
            <button class="btn-cancelar" onclick="cancelarAgendamento(${ag.id}, '${dataStr}')">Cancelar</button>
          </div>
        </div>`;
    }
    return `
      <div class="horario-row">
        <div class="horario-time">${horario}</div>
        <div class="horario-slot">Disponível</div>
      </div>`;
  }

  async function cancelarAgendamento(id, dataStr) {
    if (!confirm('Cancelar este agendamento?')) return;
    try {
      await fetch(`${API}/agendamento/${id}/cancelar`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}` }
      });
      carregarAgendaDia(dataStr);
      carregarStats();
    } catch {
      alert('Erro ao cancelar.');
    }
  }

  // =================== UTILS ===================

  function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateManual(ano, mes, dia) {
    return `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
  }

  // =================== INIT ===================
  if (token) {
    iniciarDashboard();
  }
</script>
</body>
</html>
